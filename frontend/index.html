<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins CI/CD Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:600px;
            background:#fff;
            padding:30px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        h1{
            color:#2c3e50;
            margin-bottom:15px;
        }

        p{
            color:#555;
            font-size:18px;
            margin-bottom:20px;
        }

        .card{
            background:#f5f5f5;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .card h2{
            color:#0078D7;
            margin-bottom:10px;
        }

        .card ul{
            list-style:none;
        }

        .card li{
            padding:8px 0;
            font-size:17px;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }
    </style>

</head>
<body>

<div class="container">
    <h1>Jenkins CI/CD Pipelines</h1>

    <p>
        This HTML page is stored in GitHub and automatically pulled by Jenkins Pipeline.
    </p>

    <div class="card">
        <h2>Pipeline Workflow</h2>
        <ul>
            <li>GitHub Repository</li>
            <li>Jenkins Pulls Code</li>
            <li>Pipeline Executes</li>
            <li>Build Successful</li>
        </ul>
    </div>

    <button>Build</button>
</div>

</body>
</html>
